   main:['三阴交SP6','关元CV4','气海CV6','次髎BL32','地机SP8'],
   var:[{t:'寒凝血瘀',p:'关元、中极CV3（温针灸）',m:'温经散寒活血'},{t:'气滞血瘀',p:'太冲LV3、膈俞BL17',m:'泻法，理气活血'},{t:'气血虚弱',p:'足三里ST36、脾俞BL20',m:'补法加灸'}],
   op:'经前3~5天开始，至月经来潮缓解。次髎深刺，针感达会阴效佳。',
   note:'继发性痛经需妇科检查；⚠️三阴交孕妇禁针。'},
  {id:'st',name:'中风后遗症',sub:'偏瘫·失语·吞咽困难',icon:'🧬',bg:'#E8F4F8',cat:'neuro',
   etio:'脑脉痹阻或血溢脑络，脑神受损、经络失通，形成半身不遂等后遗症。',
   main:['百会GV20','肩髃LI15','曲池LI11','足三里ST36','三阴交SP6','太冲LV3'],
   var:[{t:'上肢不遂',p:'肩髃、曲池、手三里、合谷',m:'阳经为主，强刺激'},{t:'下肢不遂',p:'环跳GB30、阳陵泉GB34、足三里',m:'阳经为主'},{t:'口眼歪斜',p:'地仓ST4、颊车ST6、阳白',m:'面部透刺'},{t:'失语',p:'廉泉CV23、哑门GV15',m:'强刺激哑门（斜向下颌刺入）'}],
   op:'发病2周后稳定期开始。"治痿独取阳明"为原则，可配头皮针（运动区）。',
   note:'脑出血急性期不宜针灸；血压不稳定时禁止；配合康复训练效果最佳。'},
];

let curCat='all';

function renderCards(list){
  const g=document.getElementById('cgrid');
  if(!list.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-3)"><div style="font-size:2.5rem;margin-bottom:.75rem">🔍</div>没有找到相关病症</div>';return;}
  g.innerHTML=list.map(c=>`
  <div class="condition-card" onclick="openMo('${c.id}')">
    <div class="cc-head">
      <div class="cc-icon" style="background:${c.bg}">${c.icon}</div>
      <div><div class="cc-name">${c.name}</div><div class="cc-sub">${c.sub}</div></div>
    </div>
    <div class="cc-body">
      <div class="cc-divider"></div>
      <div class="presc-title">主穴处方</div>
      <div class="presc-pts">${c.main.map(p=>`<span class="pp prim">${p}</span>`).join('')}</div>
      <div class="note-box"><strong>病因：</strong>${c.etio.slice(0,55)}… <span style="color:var(--coral);font-size:.75rem">点击查看完整方案 →</span></div>
    </div>
  </div>`).join('');
}

function openMo(id){
  const c=CD.find(x=>x.id===id);if(!c)return;
  document.getElementById('m-ico').textContent=c.icon;
  document.getElementById('m-ico').style.background=c.bg;
  document.getElementById('m-name').textContent=c.name;
  document.getElementById('m-sub').textContent=c.sub;
  document.getElementById('m-etio').textContent=c.etio;
  document.getElementById('m-op').textContent=c.op;
  document.getElementById('m-note').textContent=c.note;
  document.getElementById('m-main').innerHTML=`<div class="presc-pts">${c.main.map(p=>`<span class="pp prim" onclick="goAcu('${p}')">${p}</span>`).join('')}</div>`;
  if(c.var&&c.var.length){
    document.getElementById('m-var-s').style.display='';
    document.getElementById('m-var').innerHTML=`<table class="vt"><thead><tr><th>证型</th><th>加减穴位</th><th>操作</th></tr></thead><tbody>${c.var.map(v=>`<tr><td><strong>${v.t}</strong></td><td>${v.p}</td><td style="font-size:.78rem;color:var(--text-3)">${v.m}</td></tr>`).join('')}</tbody></table>`;
  }else{document.getElementById('m-var-s').style.display='none';}
  document.getElementById('mo').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeMo(e){if(e.target===document.getElementById('mo'))closeMoBtn();}
function closeMoBtn(){document.getElementById('mo').classList.remove('open');document.body.style.overflow='';}
function goAcu(label){closeMoBtn();const code=label.match(/([A-Z]{1,3}\d+)/)?.[1]||'';window.location.href='acupoints.html'+(code?'?code='+code:'');}

document.getElementById('catTabs').addEventListener('click',e=>{
  const b=e.target.closest('.cat-tab');if(!b)return;
  curCat=b.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(x=>x.classList.toggle('active',x===b));
  applyF();
});
document.getElementById('ssearch').addEventListener('input',function(){applyF(this.value.trim());});
function applyF(q=''){
  let l=[...CD];
  if(curCat!=='all')l=l.filter(c=>c.cat===curCat);
  if(q){const v=q.toLowerCase();l=l.filter(c=>c.name.includes(v)||c.sub.includes(v)||c.etio.includes(v)||c.main.some(p=>p.includes(v)));}
  renderCards(l);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMoBtn();});
renderCards(CD);
</script>
</body>
</html>
